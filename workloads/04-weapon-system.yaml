name: WeaponSystem
owner: claude-code
priority: P0-prototype
status: ✅ DONE (Sprint 3 + Sprint 7 visual + Sprint 8b 30-weapon retune + Sniper headshot, 2026-05-03)
sprint_8b_receipt: receipts/sprint-8b-200hp-rebalance.md

# ============= Sprint 8b 計劃中的修改（CEO 決議 b 後重寫 2026-05-03） =============
# 詳見 proposals/sprint-8-200hp-balance.md §3.5 + §4.2
#
# CEO 拍板路線 (b)：「重新校 30 武器的 DPS 公式，讓 Common→Demon 的 TTK 差距收斂」
#
# 注意：此 contract 原寫成「6 把武器 rebalance」是基於 Sprint 7 之前的舊狀態。
# main 上已有 30 武器 × 6 個稀有度。Sprint 8a 衛生補課完成後執行 Sprint 8b。

sprint_8b_changes:
  goal: "30 武器 DPS 公式收斂 + Sniper Type-based headshot + 200 HP 適配"

  # ---------- (b) 30 武器 DPS 公式收斂 ----------
  rarity_dps_retune:
    current_multipliers: { Common: 1.00, Uncommon: 1.25, Rare: 1.55, Epic: 1.95, Legendary: 2.40, Demon: 3.00 }
    new_multipliers:     { Common: 1.00, Uncommon: 1.15, Rare: 1.30, Epic: 1.50, Legendary: 1.70, Demon: 1.90 }
    common_to_demon_gap: { current: 3.00, new: 1.90, reduction_pct: 37 }
    rationale: |
      CEO 拍板路線 (b)：商店付費差距從 3x DPS 收斂到 1.9x DPS。
      新玩家在 200 HP 下不被 Demon 武器碾壓，但 Demon 仍維持「最強」感受。
    common_baseline_targets:
      Pistol:   { ttk_vs_200hp: "2.5–3.0s",  dps: "67–80" }
      SMG:      { ttk_vs_200hp: "1.5–2.0s",  dps: "100–133", note: "Common 無 SMG，Stinger 起跳 Uncommon" }
      Rifle:    { ttk_vs_200hp: "1.5–2.0s",  dps: "100–133", note: "Common 無 Rifle，Phantom 起跳 Uncommon" }
      Shotgun:  { ttk_vs_200hp: "0.8–1.5s 近距", dps: "130–250" }
      Sniper:   { ttk_vs_200hp: "1.5–2.0s 單發", dps: "100–133", note: "Common 無 Sniper" }
      Knife:    { ttk_vs_200hp: "1.5–2.5s",  dps: "80–133" }
      Minigun:  { ttk_vs_200hp: "—", dps: "—", note: "Hailstorm Legendary 唯一" }
    formula: "新 Damage = Common baseline DPS × 新 rarity 倍率 × FireRate（per pellet 或 per shot）"
    deliverable_before_implementation: |
      Claude 在 Sprint 8b 開工前提交 proposals/30-weapon-dps-retune.md，
      列出 30 武器逐一的新 Damage 值給 CEO 一次拍板。

  # ---------- Sniper Type-based Headshot ----------
  headshot_system:
    scope: "ONLY config.Type == 'Sniper' — 5 把 Wraith 系列"
    multiplier_proposed: 2.0
    # 倍率以 post-(b) body damage 為基礎評估（合成狀態下實際遊戲體驗）。
    # 詳見 proposals/sprint-8-200hp-balance.md §3.5.4。
    multiplier_options:
      A: { value: 1.33,
           wraith_scout_post_b_headshot: 160,
           wraith_scout_oneshot: false,
           other_snipers_oneshot: true,
           pairs_with: D2,
           evaluation: "Wraith Scout 不 1-shot；其他 Sniper 1-shot — 對應 D2 milestone" }
      B: { value: 2.00,
           wraith_scout_post_b_headshot: 240,
           wraith_scout_oneshot: true,
           other_snipers_oneshot: true,
           pairs_with: D1,
           evaluation: "FPS 標準；全 Sniper 1-shot 爆頭 — 推薦，配 D1" }
      C: { value: "+200 fixed",
           evaluation: "全 Sniper 1-shot 但跟 body TTK 脫鉤；不推薦" }
    rationale_for_type_based: |
      Reconciliation 2026-05-03：原 contract 寫 'weaponName == "Wraith"'
      但 main 已有 5 把 Sniper（Wraith Scout/Hunter/Frost/Apex/Abyss）。
      改用 config.Type=="Sniper" 涵蓋所有 5 把。
    detection: |
      MatchManager.lua FireWeapon handler：
      local isHeadshot = result.Instance.Name == "Head"
      if config.Type == "Sniper" and isHeadshot then
          damage = damage * GameConfig.HEADSHOT_MULTIPLIER  -- 2.0
      end
    config_addition: |
      GameConfig.HEADSHOT_MULTIPLIER = 2.0
      （不再為單一武器加 HeadshotDamage 欄位）
    # 採設計決議 D1（見 proposals/sprint-8-200hp-balance.md §3.5.2）：
    # 全 Sniper post-(b) retune 後爆頭都 1-shot 200 HP 玩家。
    # body_after_b 數值是 §4.2.3 範例公式推算，Sprint 8b 開工前由
    # proposals/30-weapon-dps-retune.md 細化拍板（可能 ±5%）。
    sniper_headshot_table_at_2x:
      "Wraith Scout":  { rarity: Uncommon,  body_after_b_estimate: 120, headshot_at_2x: 240, oneshot_200hp: true }
      "Wraith Hunter": { rarity: Rare,      body_after_b_estimate: 172, headshot_at_2x: 344, oneshot_200hp: true }
      "Wraith Frost":  { rarity: Epic,      body_after_b_estimate: 190, headshot_at_2x: 380, oneshot_200hp: true }
      "Wraith Apex":   { rarity: Legendary, body_after_b_estimate: 206, headshot_at_2x: 412, oneshot_200hp: true }
      "Wraith Abyss":  { rarity: Demon,     body_after_b_estimate: 220, headshot_at_2x: 440, oneshot_200hp: true, special: "Pierce=true" }
    design_decision_d1: |
      D1 採用：全 Sniper Type 1-shot 爆頭。Sniper 內部稀有度進階靠 body TTK / Range /
      MagSize / 特殊機制（Pierce），不靠爆頭差異化。與 (b) 路線「收斂付費差距」精神一致。
    design_decision_d2_alt: |
      D2 替代（CEO 若要保留 Wraith Scout 不 1-shot 的 milestone）：
      (a) 把 Wraith Scout body damage 拉低至 ≤99（違反 (b) 公式）
      (b) Sniper headshot multiplier 改 rarity-tiered（Uncommon 1.5x、Rare+ 2.0x）— 推薦
      (c) Wraith Scout 為 floor + multiplier ceiling 特例
      預設不採。CEO 於 30-weapon-dps-retune.md 拍板時可改決議。
    npc_compat: |
      R15 NPC 也有 Head part，命名一致 → 玩家 vs NPC 也適用。
      NPC 戴的 hat/hood/helmet accessory 命中時 hitPart.Name 不是 "Head" → 不算爆頭（合理）。
    excluded_types: "Pistol, SMG, Rifle, Shotgun, Knife, Minigun — 命中 Head = 一般傷害"
    excluded_rationale: "Sprint 8b 不擴展全武器爆頭機制；Sprint 9 可評估"

  # ---------- 不動的部分 ----------
  unchanged:
    fire_rate: "全部 30 武器維持現值"
    mag_size: "全部 30 武器維持現值"
    reload_time: "全部 30 武器維持現值"
    pellets: "Shotgun 系列各武器 Pellets 數維持（6/8/8/9/8/8/8 不一）"
    spread: "全部維持現值；playtest 後若中遠距落點偏離期望再 tune"
    special_mechanics: "Phantom Whisper Silent / Phantom Hellfire Burn / Wraith Abyss Pierce 維持"

  stages:
    - define: 新 RARITY 倍率 + Common baseline DPS（per Type）
    - define: HEADSHOT_MULTIPLIER 數值（待 CEO 拍板 2.0x）
    - deliverable: Claude 提交 proposals/30-weapon-dps-retune.md（30 武器逐一 Damage 新值）
    - implement: GameConfig.RARITY 倍率改為 1.0/1.15/1.30/1.50/1.70/1.90
    - implement: GameConfig.WEAPONS 30 把 Damage 按公式更新
    - implement: GameConfig.HEADSHOT_MULTIPLIER = 2.0 新增
    - implement: MatchManager FireWeapon handler 加 config.Type=="Sniper" headshot 分支
    - verify: Common Pistol (Viper Mk1) 對 200 HP 玩家 TTK 落在 2.5–3.0s
    - verify: Demon vs Common DPS 比 ≤ 1.9x
    - verify: post-(b) Wraith Scout (Uncommon) 爆頭一發秒殺 200 HP 玩家（D1，body 120 × 2.0x = 240）
    - verify: post-(b) Wraith Hunter (Rare) 爆頭一發秒殺 200 HP 玩家（body 172 × 2.0x = 344）
    - verify: post-(b) 全 5 把 Sniper 對 200 HP 玩家爆頭都秒殺（D1）
    - verify: 其他 Type 命中 Head = 一般傷害

  new_success_criteria:
    - "30 武器 Damage 落在新 Rarity DPS 公式 ±5%"
    - "Common→Demon DPS gap 從 3.0x → 1.9x"
    - "Sniper Type 5 把全部套用 HEADSHOT_MULTIPLIER"
    - "其他 Type 命中 Head = 一般傷害（嚴格 scope control）"
    - "Common 武器對 200 HP TTK 落在 2.5–3.0s"

  decision_pending:
    - "HEADSHOT_MULTIPLIER 確認 2.0x（推薦 B）"
    - "30-weapon-dps-retune.md follow-up doc 等 Claude 提交，CEO 一次拍板"

  withdrawn:
    - "Stinger 微調 18 → 20（main 上有 4 把 Stinger，個別調整不適合，全部走 (b) 公式 retune）"
    - "Thunder Pellets 8 → 10（main 上 7 把 Shotgun 各自不同 Pellets，不批量改）"

# ============= 已完成的歷史 =============
stages:
  - define: 6 把虛構武器數據 (GameConfig)
  - implement: 射擊 Raycast + 傷害計算
  - implement: 彈藥消耗 + 換彈
  - implement: 客戶端輸入 + 自動射擊
  - implement: 武器 Tool + 第三人稱可見 mesh (Sprint 7)
  - implement: muzzle flash + raycast origin 從 Muzzle.WorldPosition (Sprint 7)
  - verify: 每把武器射擊 + 傷害 + 換彈正常
success_criteria:
  - 6 把武器可裝備可射擊
  - Viper 25, Stinger 15, Phantom 30, Thunder 12×8, Wraith 90, Fang 40 (Sprint 8 重新平衡)
  - 全自動/半自動模式正確
  - 彈藥耗盡需換彈
  - 玩家右手握槍可見、muzzle flash 從槍口出 (Sprint 7)
artifacts:
  - src/ReplicatedStorage/GameConfig.lua (weapon data)
  - src/ServerScriptService/MatchManager.lua (fire handler)
  - src/StarterPlayerScripts/WeaponClient.lua
  - src/ServerStorage/WeaponSystem.lua
  - src/ServerStorage/WeaponMeshes.lua (Sprint 7)
recovery:
  - Raycast 穿牆 → FilterDescendantsInstances 排除自己
  - 傷害不觸發 → 檢查 RemoteEvent 是否在 GameEvents 建立
  - Tool grip 角度錯 → 用 Tool.Grip 屬性而非 Motor6D，Handle -Z 對齊 hand 前向 (Sprint 7 lesson)
  - muzzle flash 看不到 → client-only 效果，第三人稱 self 才看得到 (待 Sprint 9 跨玩家可見)
